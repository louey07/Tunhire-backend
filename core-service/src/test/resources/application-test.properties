spring.application.name=tunhire

# Database connection - port 5433 matches docker-compose.yaml
spring.datasource.url=jdbc:postgresql://localhost:5433/tunhire
spring.datasource.username=tunhire
spring.datasource.password=tunhire

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=tunhire-secret-key-must-be-at-least-32-characters-long
jwt.expiration-ms=86400000
