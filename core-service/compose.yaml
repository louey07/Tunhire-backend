services:
  postgres:
    image: "postgres:latest"
    environment:
      - "POSTGRES_DB=tunhire"
      - "POSTGRES_PASSWORD=${DB_PASSWORD:-tunhire}"
      - "POSTGRES_USER=${DB_USERNAME:-tunhire}"
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      - "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tunhire"
      - "DB_USERNAME=${DB_USERNAME:-tunhire}"
      - "DB_PASSWORD=${DB_PASSWORD:-tunhire}"
      - "JWT_SECRET=${JWT_SECRET:-tunhire-secret-key-must-be-at-least-32-characters-long}"
      - "SPRING_JPA_HIBERNATE_DDL_AUTO=update"
    ports:
      - "8081:8080"

