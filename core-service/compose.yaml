services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=tunhire'
      - 'POSTGRES_PASSWORD=tunhire'
      - 'POSTGRES_USER=tunhire'
    ports:
      - '5433:5432'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tunhire'
      - 'SPRING_DATASOURCE_USERNAME=tunhire'
      - 'SPRING_DATASOURCE_PASSWORD=tunhire'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
    ports:
      - '8081:8080'
